name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Fetch third-party binaries (otvdm, DOSBox)
        shell: bash
        run: bash scripts/fetch-deps.sh

      - name: Read version from tag
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # v0.1.5 -> 0.1.5 (strip leading 'v' pra ficar SemVer puro no exe/manifest)
            V="${GITHUB_REF#refs/tags/v}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            V="${GITHUB_REF#refs/tags/}"
          else
            V="0.0.0-dev.$(date +%Y%m%d%H%M%S)"
          fi
          echo "value=$V" >> "$GITHUB_OUTPUT"
          echo "==> version = $V"

      - name: Build launcher (Release, x86)
        shell: bash
        run: dotnet build src/ElifootLauncher.csproj -c Release -p:Version=${{ steps.version.outputs.value }} -p:AssemblyVersion=${{ steps.version.outputs.value }}.0 -p:FileVersion=${{ steps.version.outputs.value }}.0

      - name: Build ScreenHook.dll (x86 native, MinHook)
        shell: pwsh
        run: |
          cmake -A Win32 -S native/ScreenHook -B build/screenhook
          cmake --build build/screenhook --config Release
          copy build\screenhook\Release\ScreenHook.dll src\bin\Release\net48\ScreenHook.dll

      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress

      - name: Compile launcher installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DAppVersion=${{ steps.version.outputs.value }}" installer\setup.iss

      - name: Upload build artifact (always, for debug)
        uses: actions/upload-artifact@v4
        with:
          name: launcher-installer
          path: installer/Output/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe
          generate_release_notes: true
          name: ${{ steps.version.outputs.value }}
          body: |
            ## Download

            **`elifoot98-launcher-setup-*.exe`** — instalador do launcher + Elifoot 98 + otvdm. Instala em `C:\Elifoot98Launcher`.

            ## O que tem no launcher

            - **Jogar Elifoot 98** — abre o jogo em janela (640×600 ou resolução configurada), centralizado, sem tela cheia forçada
            - **Editor de Equipes** — abre o EDITEQ.EXE original
            - **Editor de Árbitros** — edita a lista de juízes (nome + país) diretamente no `REFEREE.TXE`
            - **Editor de Save** — edita **verba** do clube + **força** e **salário** dos jogadores em qualquer `.e98`
              - Lista todos os times do save (funciona com patches da comunidade de 42 a 128+ times)
              - Aceita saves single-coach e multi-coach (até 6 técnicos)
              - Backup `.bak` automático na primeira gravação
            - **Aplicar Patch** — instala patches `.zip` da comunidade
              - Substitui arquivos (FLAGS, CTRGROUP, executáveis, etc.)
              - Preserva `JOGOS/` (seus saves)
              - Renomeia `EQUIPAS/` atual pra `EQUIPAS_OLD` (ou `_2`, `_3`, ...) antes de aplicar
            - **Configurações** — resolução da janela e modo fullscreen

            ## Instalação

            1. Baixe o `elifoot98-launcher-setup-*.exe` abaixo
            2. Se o navegador bloquear: `...` → **Manter** → **Manter mesmo assim**
            3. Botão direito → **Propriedades** → marque **Desbloquear** (opcional)
            4. Execute — se aparecer **SmartScreen**: **Mais informações** → **Executar assim mesmo**
            5. UAC vai pedir permissão pra criar pasta na raiz de C:
            6. Siga o assistente

            > O instalador não é assinado digitalmente (custa caro pra hobby). Verifique SHA256 se quiser.

            ## Requisitos
            - Windows 10 (1809+) ou 11
            - .NET Framework 4.8 (já vem em Win 10/11)
