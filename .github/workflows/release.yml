name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Fetch third-party binaries (otvdm, DOSBox)
        shell: bash
        run: bash scripts/fetch-deps.sh

      - name: Read version from tag
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # v0.1.5 -> 0.1.5 (strip leading 'v' pra ficar SemVer puro no exe/manifest)
            V="${GITHUB_REF#refs/tags/v}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            V="${GITHUB_REF#refs/tags/}"
          else
            V="0.0.0-dev.$(date +%Y%m%d%H%M%S)"
          fi
          echo "value=$V" >> "$GITHUB_OUTPUT"
          echo "==> version = $V"

      - name: Build launcher (Release, x86)
        shell: bash
        run: dotnet build src/ElifootLauncher.csproj -c Release -p:Version=${{ steps.version.outputs.value }} -p:AssemblyVersion=${{ steps.version.outputs.value }}.0 -p:FileVersion=${{ steps.version.outputs.value }}.0

      - name: Build ScreenHook.dll (x86 native, MinHook)
        shell: pwsh
        run: |
          cmake -A Win32 -S native/ScreenHook -B build/screenhook
          cmake --build build/screenhook --config Release
          copy build\screenhook\Release\ScreenHook.dll src\bin\Release\net48\ScreenHook.dll

      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress

      - name: Compile launcher installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DAppVersion=${{ steps.version.outputs.value }}" installer\setup.iss

      - name: Upload build artifact (always, for debug)
        uses: actions/upload-artifact@v4
        with:
          name: launcher-installer
          path: installer/Output/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe
          generate_release_notes: true
          name: ${{ steps.version.outputs.value }}
          body: |
            ## Downloads

            Nesta release existem três executáveis distintos:

            - **`elifoot98-launcher-setup-*.exe`** — instalador do launcher principal + Elifoot 98 + otvdm. Instala em `C:\Elifoot98Launcher`.
            - **`elifoot98-registrador-setup-*.exe`** — instalador do Registrador (gera Contra-Senha via `CRACK.EXE`). Instala em `C:\Elifoot98Registrador`.
            - **`elifoot98-registrador-portable-*.exe`** — versão **portable** do Registrador em um único `.exe` (~9 MB), com CRACK.EXE + DOSBox embutidos. Não instala nada — só clica e usa. Extrai temporário em `%TEMP%\ElifootRegistrador` no primeiro uso.

            > Separamos por questão de licenciamento — o `CRACK.EXE` é o keygen original do autor Andre Elias.

            ## Instalação

            1. Baixe o instalador desejado abaixo (ou os dois)
            2. Se o navegador bloquear: `...` → **Manter** → **Manter mesmo assim**
            3. Clique com o botão direito no `.exe` → **Propriedades** → marque **Desbloquear** (opcional)
            4. Execute — se aparecer **SmartScreen**: **Mais informações** → **Executar assim mesmo**
            5. UAC vai pedir permissão para criar pasta na raiz de C:
            6. Siga o assistente

            > Instaladores não são assinados digitalmente (custa caro pra hobby). Verifique SHA256 se quiser.

            ## Requisitos
            - Windows 10 (1809+) ou 11
            - .NET Framework 4.8 (vem em Win 10/11)
